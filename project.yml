name: NoiseAlert
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.2"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: 83VGKGSQUH
    CODE_SIGN_STYLE: Automatic
targets:
  NoiseAlert:
    type: application
    platform: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.noisealert
        TARGETED_DEVICE_FAMILY: "1,2"
    sources:
      - path: NoiseAlert
    info:
      path: NoiseAlert/Info.plist
      properties:
        CFBundleDisplayName: NoiseAlert
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "1.2"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UIDeviceFamily:
          - 1
          - 2
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: ""
        NSMicrophoneUsageDescription: 周囲の騒音レベルを測定するためにマイクを使用します。
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
